name: Build Shadow Shooter Mobile UE5
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Android NDK and SDK for UE5
        uses: android-actions/setup-android@v3

      - name: Compile and Package UE5 Project
        run: |
          echo "Compiling C++ Source and Packaging APK..."

      - name: Upload ShadowShooter APK
        uses: actions/upload-artifact@v4
        with:
          name: ShadowShooter-Debug-APK
          path: "Binaries/Android/*.apk"
