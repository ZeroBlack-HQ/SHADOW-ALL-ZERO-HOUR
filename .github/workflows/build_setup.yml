name: ShadowShooter Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup UE5 Environment
      uses: mik14a/setup-ue@v1
      with:
        ue-version: "5.3"

    - name: Verify RunUAT.sh exists
      run: |
        echo "Verifying RunUAT.sh..."
        ls -l /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh

    - name: Package for Android
      run: |
        /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh BuildCookRun \
        -project="$GITHUB_WORKSPACE/ShadowShooter.uproject" \
        -platform=Android \
        -clientconfig=Development \
        -cook \
        -stage \
        -archive \
        -pak \
        -prereqs \
        -nodebuginfo \
        -targetplatform=Android \
        -cookflavor=ASTC \
        -build \
        -utf8output
      
    - name: Upload APK and OBB
      uses: actions/upload-artifact@v4
      with:
        name: SHADOWFALL-ZERO-HOUR
        path: |
          **/Android/*.apk
          **/Android/*.obb

