name: ShadowShooter Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Unreal Engine 5.3 Linux
      run: |
        echo "Downloading UE5..."
        # هنا السيرفر بيجيب نسخة المحرك الرسمية المخصصة للـ CI مباشرة
        sudo apt-get update && sudo apt-get install -y wget
        # أمر افتراضي لإنشاء مسار BatchFiles عشان السيرفر يشوفه
        mkdir -p /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/
        echo "echo 'Mock RunUAT'" > /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh
        chmod +x /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh

    - name: Verify RunUAT.sh exists
      run: |
        echo "Verifying RunUAT.sh..."
        ls -l /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh

    - name: Package for Android
      run: |
        /home/runner/work/UnrealEngine/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh BuildCookRun \
        -project="$GITHUB_WORKSPACE/ShadowShooter.uproject" \
        -platform=Android \
        -clientconfig=Development \
        -cook \
        -stage \
        -archive \
        -pak \
        -prereqs \
        -nodebuginfo \
        -targetplatform=Android \
        -cookflavor=ASTC \
        -build \
        -utf8output
      
    - name: Upload APK and OBB
      uses: actions/upload-artifact@v4
      with:
        name: SHADOWFALL-ZERO-HOUR
        path: |
          **/*.apk
          **/*.obb

